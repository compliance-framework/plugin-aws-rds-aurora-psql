name: Build and Upload Artifacts

on:
  workflow_call:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          # 'latest', 'nightly', or a semver
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Install gooci cli
        run: go install github.com/compliance-framework/gooci@v0.0.7
      - name: Authenticate gooci cli
        env:
          GITHUB_ACTOR_SAFE: ${{ github.actor }}
          GITHUB_TOKEN_SAFE: ${{ secrets.GITHUB_TOKEN }}
        run: gooci login ghcr.io --username "${GITHUB_ACTOR_SAFE}" --password "${GITHUB_TOKEN_SAFE}"
      - name: gooci Upload Version
        env:
          REPO_OWNER_SAFE: ${{ github.repository_owner }}
          REPO_NAME_SAFE: ${{ github.event.repository.name }}
          REF_NAME_SAFE: ${{ github.ref_name }}
        run: |
          SAFE_TAG="$(printf '%s' "${REF_NAME_SAFE}" | tr '/:@ ' '-' | tr -cd '[:alnum:]_.-')"
          gooci upload --annotate="org.ccf.plugin.protocol.version=2" "dist/" "ghcr.io/${REPO_OWNER_SAFE}/${REPO_NAME_SAFE}:${SAFE_TAG}"
      - name: gooci Upload Latest
        if: "!github.event.release.prerelease"
        env:
          REPO_OWNER_SAFE: ${{ github.repository_owner }}
          REPO_NAME_SAFE: ${{ github.event.repository.name }}
        run: gooci upload --annotate="org.ccf.plugin.protocol.version=2" "dist/" "ghcr.io/${REPO_OWNER_SAFE}/${REPO_NAME_SAFE}:latest"
